name: Build APK From ZIP

on:
  workflow_dispatch:
  push:
    branches: [ "main", "master" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.10.2'

      - name: Unzip project
        run: unzip -o ANAMWebViewApp_GitHub_Actions*.zip

      - name: Build debug APK
        working-directory: ANAMWebViewApp_GitHub_Actions
        run: gradle assembleDebug

      - name: Rename APK
        run: |
          mkdir -p release
          cp ANAMWebViewApp_GitHub_Actions/app/build/outputs/apk/debug/app-debug.apk release/ANAM-CIPAA-debug.apk

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: ANAM-CIPAA-debug-apk
          path: release/ANAM-CIPAA-debug.apk
